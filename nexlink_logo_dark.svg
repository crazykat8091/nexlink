<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120">
  <title>NexLink Logo - Dark Mode</title>
  <defs>
    <linearGradient id="silverGradDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <linearGradient id="orangeGradDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb870"/>
      <stop offset="50%" stop-color="#ff8a2a"/>
      <stop offset="100%" stop-color="#bf5a00"/>
    </linearGradient>
    <radialGradient id="flareGradDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff8a2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="540" height="120" fill="#0e0e0e" rx="12"/>
  <text x="10" y="92" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="85" fill="url(#silverGradDark)" style="letter-spacing:-4px">Nex</text>
  <g transform="translate(175, 12)">
    <path d="M40 0 L75 0 L35 95 L0 95 Z" fill="url(#silverGradDark)"/>
    <path d="M60 0 L95 0 L55 95 L20 95 Z" fill="url(#orangeGradDark)" opacity="0.9" transform="translate(10, 5)"/>
    <path d="M80 0 L115 0 L75 95 L40 95 Z" fill="url(#orangeGradDark)" opacity="0.8" transform="translate(20, 10)"/>
    <circle cx="68" cy="48" r="20" fill="url(#flareGradDark)"/>
  </g>
  <text x="325" y="92" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="85" fill="url(#orangeGradDark)" style="letter-spacing:-4px">Link</text>
</svg>